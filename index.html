<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Belle | Boutique</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .logo { font-size: 1.8rem; font-weight: bold; color: #d4a373; letter-spacing: 2px; }
        .hero { background: #fdfaf5; padding: 60px 20px; text-align: center; }
        .hero h2 { color: #4a4a4a; margin-bottom: 10px; }
        .products { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card { border: 1px solid #eee; padding: 10px; text-align: center; border-radius: 8px; }
        .img-box { background: #f0f0f0; height: 150px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; color: #999; font-size: 0.8rem; }
        .price { color: #d4a373; font-weight: bold; margin: 5px 0; }
        .btn { background: #333; color: #fff; padding: 8px; width: 100%; border: none; border-radius: 4px; font-size: 0.8rem; }
        footer { background: #1a1a1a; color: #fff; text-align: center; padding: 20px; font-size: 0.7rem; margin-top: 20px; }
    </style>
</head>
<body>
    <header><div class="logo">ME BELLE</div></header>
    <section class="hero">
        <h2>Sua Melhor Versão</h2>
        <p>Moda feminina e elegância.</p>
    </section>
    <div class="products">
        <div class="card"><div class="img-box">Foto 1</div><p>Vestido Rose</p><p class="price">R$ 189,90</p><button class="btn">Comprar</button></div>
        <div class="card"><div class="img-box">Foto 2</div><p>Blusa Soft</p><p class="price">R$ 89,90</p><button class="btn">Comprar</button></div>
    </div>
    <footer><p>&copy; 2024 ME BELLE BOUTIQUE</p></footer>
</body>
</html>
